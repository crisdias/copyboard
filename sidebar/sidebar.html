<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copyboard</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Copyboard</h1>
      <button id="add-note" class="add-button" title="Add new note">+</button>
    </header>

    <main id="notes-container" class="notes-container">
      <!-- Notes will be dynamically inserted here -->
    </main>

    <footer>
      <div class="gear-menu-container">
        <button id="gear-menu-btn" class="gear-button" title="Options">⚙️</button>
        <div id="gear-dropdown" class="gear-dropdown hidden">
          <button id="export-btn" class="dropdown-item">📤 Export notes</button>
          <button id="import-btn" class="dropdown-item">📥 Import notes</button>
        </div>
      </div>
    </footer>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
